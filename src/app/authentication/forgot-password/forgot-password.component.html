@if (isLoading) {
  <div>
    <app-loader></app-loader>
  </div>
}
<div class="container">
  <div class="row justify-content-center align-items-center">
    <div class="fullcolumn">
      <mat-card>
        <mat-card-header>
          <mat-card-title>Reset Password</mat-card-title>
          <mat-card-subtitle>
            Return to <a class="sign-up-action" href="login">Sign In</a>
          </mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
          <mat-divider></mat-divider>
          <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
            <div class="form-field">
              <mat-form-field appearance="fill" class="w-100">
                <mat-label>Email</mat-label>
                <input matInput formControlName="email" required />
                @if (forgotPasswordForm.get('email')?.hasError('required')) {
                  <mat-error>
                    Email is required.
                  </mat-error>
                }
                @if (forgotPasswordForm.get('email')?.hasError('email')) {
                  <mat-error>
                    Please enter a valid email address.
                  </mat-error>
                }
              </mat-form-field>
            </div>
            <div class="action-buttons">
              <button mat-button class="btn btn-primary" type="submit">Send Reset Link</button>
            </div>
          </form>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
@if (showAlert) {
  <div class="alert-overlay">
    <div class="alert-modal">
      <p>{{ alertMessage }}</p>
      <button mat-button class="btn btn-primary" type="button" (click)="closeAlert()">OK</button>
    </div>
  </div>
}
