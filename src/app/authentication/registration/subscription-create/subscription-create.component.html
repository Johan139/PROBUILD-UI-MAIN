<h2 mat-dialog-title>Choose a subscription</h2>

<mat-dialog-content>
  <div class="section">
    <form [formGroup]="form">
      <div *ngIf="data.notice" class="notice-chip">
        {{ data.notice }}
      </div>

      <!-- TEAM LOGIC COMMENTED OUT 
      <div class="full-width" style="margin-bottom: 12px">
        <label class="block mb-1">Apply to</label>
        <mat-radio-group formControlName="forWhom">
          <mat-radio-button value="self" [disabled]="hasActiveFor(data.userId)">
            My account
          </mat-radio-button>

          <mat-radio-button value="team" class="ml-4" disabled>
            Team member
          </mat-radio-button>
        </mat-radio-group>
      </div>
      -->

      <!-- Subscription package picker -->
      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Subscription Package</mat-label>
        <mat-select formControlName="subscriptionPackage" required>
          <mat-option *ngFor="let s of data.packages" [value]="s">
            {{ s.display }}
            {{
              form.value.billingCycle === "yearly"
                ? (s.annualAmount | currency: "USD" : "symbol" : "1.2-2")
                : (s.amount | currency: "USD" : "symbol" : "1.2-2")
            }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <!-- TEAM MEMBER DROPDOWN REMOVED -->
      <!--
      <mat-form-field *ngIf="false" ...></mat-form-field>
      -->

      <!-- Billing cycle -->
      <div class="full-width" style="margin-bottom: 12px">
        <label class="block mb-1">Billing Cycle</label>
        <mat-radio-group formControlName="billingCycle">
          <mat-radio-button value="monthly">Monthly</mat-radio-button>
          <mat-radio-button value="yearly" class="ml-4"
            >Yearly</mat-radio-button
          >
        </mat-radio-group>
      </div>

      <!-- Active subscription warning (self only) -->
      <!-- team logic removed -->
      <mat-hint *ngIf="false" style="color: #c62828"></mat-hint>

      <mat-dialog-actions align="end">
        <button mat-button (click)="cancel()" class="submit-btn">Cancel</button>

        <button
          mat-raised-button
          color="primary"
          (click)="save()"
          class="submit-btn"
          [disabled]="form.invalid || hasActiveFor(data.userId)"
        >
          Confirm
        </button>
      </mat-dialog-actions>
    </form>
  </div>
</mat-dialog-content>
