<div *ngIf="isLoading">
  <app-loader></app-loader>
</div>

<div class="page-backdrop">
  <div class="login-card" role="region" aria-label="Sign in form">
    <!-- Close button (optional, mirrors screenshot) -->

    <!-- Header -->
    <div class="card-header">
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">
          <!-- Replace with your actual logo/icon -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="currentColor" />
          </svg>
        </div>
        <span class="brand-name">ProBuild AI</span>
      </div>

      <h1 class="card-title">Welcome Back</h1>
      <p class="card-subtitle">
        Sign in to access your blueprints and estimates
      </p>
    </div>

    <!-- Form -->
    <form
      [formGroup]="loginForm"
      (ngSubmit)="onLogin()"
      novalidate
      class="card-form"
    >
      <!-- Email -->
      <div class="field-group">
        <label class="field-label" for="email">EMAIL ADDRESS</label>
        <div class="input-wrapper">
          <input
            id="email"
            class="field-input"
            type="email"
            formControlName="email"
            placeholder="name@company.com"
            required
            autocomplete="email"
            inputmode="email"
            aria-describedby="emailError"
          />
        </div>
        <span
          id="emailError"
          class="field-error"
          *ngIf="
            loginForm.get('email')?.touched && loginForm.get('email')?.invalid
          "
          role="alert"
        >
          <span *ngIf="loginForm.get('email')?.hasError('required')"
            >Email is required.</span
          >
          <span *ngIf="loginForm.get('email')?.hasError('email')"
            >Enter a valid email.</span
          >
        </span>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label class="field-label" for="password">PASSWORD</label>
        <div class="input-wrapper input-wrapper--suffix">
          <input
            id="password"
            class="field-input"
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
            aria-describedby="passwordError"
          />
          <button
            class="visibility-btn"
            type="button"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'"
            [attr.aria-pressed]="!hidePassword"
          >
            <!-- Eye icon -->
            <svg
              *ngIf="hidePassword"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
              <circle cx="12" cy="12" r="3" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
            <svg
              *ngIf="!hidePassword"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
        <span
          id="passwordError"
          class="field-error"
          *ngIf="
            loginForm.get('password')?.touched &&
            loginForm.get('password')?.invalid
          "
          role="alert"
        >
          <span *ngIf="loginForm.get('password')?.hasError('required')"
            >Password is required.</span
          >
          <span *ngIf="loginForm.get('password')?.hasError('minlength')"
            >Password must be at least 10 characters.</span
          >
        </span>
      </div>

      <!-- Remember me + Forgot password -->
      <div class="actions-row">
        <label class="checkbox-label">
          <input type="checkbox" class="checkbox-input" />
          <span class="checkbox-custom" aria-hidden="true"></span>
          Remember me
        </label>
        <a class="forgot-link" routerLink="/forgot-password"
          >Forgot password?</a
        >
      </div>

      <!-- Submit -->
      <button
        mat-button
        class="btn btn-primary"
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
      >
        {{ isLoading ? "SIGNING IN…" : "SIGN IN" }}
      </button>

      <!-- Divider -->
      <div class="divider" aria-hidden="true">
        <span></span><span class="divider-text">or</span><span></span>
      </div>

      <!-- Google Sign-In -->
      <div id="googleSignInDiv" class="google-btn-container light-scheme"></div>
    </form>

    <!-- Footer -->
    <div class="card-footer">
      Don't have an account?
      <a class="footer-cta" routerLink="/register">Sign Up Now</a>
    </div>
  </div>
</div>

<!-- Alert modal -->
<div
  *ngIf="showAlert"
  class="alert-overlay"
  role="dialog"
  aria-modal="true"
  aria-label="Notification"
>
  <div class="alert-modal">
    <p>{{ alertMessage }}</p>
    <div *ngIf="showResendLink" class="resend-row">
      <button type="button" class="link-button" (click)="resendEmail()">
        Resend Verification Email
      </button>
    </div>
    <button mat-button class="btn btn-secondary" type="button" (click)="closeAlert()">
      Close
    </button>
  </div>
</div>
