<div class="page-wrapper">
  <mat-card class="page-card">
    <h2>Email Templates</h2>

    <ng-container *ngIf="templates$ | async as templates; else loading">
      <div class="template-grid" *ngIf="templates.length; else empty">
        <div
          class="template-card"
          *ngFor="let template of templates; trackBy: trackById"
          (click)="openTemplate(template)"
        >
          <!-- Top Row -->
          <div class="card-header">
            <div class="icon-wrapper">
              <mat-icon>mail</mat-icon>
            </div>

            <div class="badges">
              <span
                class="status-badge"
                [class.active]="template.isActive"
                [class.inactive]="!template.isActive"
              >
                {{ template.isActive ? "Published" : "Draft" }}
              </span>

              <span class="env-badge"> production </span>
            </div>
          </div>

          <!-- Title -->
          <div class="card-title">
            {{ template.templateName }}
          </div>

          <!-- Internal Key / Subject -->
          <div class="card-key">
            {{ template.subject }}
          </div>

          <!-- Footer -->
          <div class="card-footer">
            <div class="meta">
              {{
                template.modifiedDate || template.createdDate
                  | date: "mediumDate"
              }}
            </div>

            <button
              mat-icon-button
              (click)="editTemplate(template); $event.stopPropagation()"
            >
              <mat-icon>edit</mat-icon>
            </button>
          </div>
        </div>
      </div>
    </ng-container>

    <ng-template #loading>
      <p>Loading templates...</p>
    </ng-template>

    <ng-template #empty>
      <p>No templates found.</p>
    </ng-template>
  </mat-card>
</div>
