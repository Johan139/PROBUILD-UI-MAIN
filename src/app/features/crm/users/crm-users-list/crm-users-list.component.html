<div class="page-wrapper">
  <mat-card class="page-card">
    <div class="topbar">
      <button mat-button routerLink="/crm">
        <mat-icon>arrow_back</mat-icon>
        Back
      </button>

      <div>
        <h2>Users</h2>
        <p>Search and view platform users.</p>
      </div>
    </div>

    <div class="filters">
      <mat-form-field appearance="outline" class="filter">
        <mat-label>Search</mat-label>
        <input matInput [formControl]="search" placeholder="Name or email" />
      </mat-form-field>
    </div>

    <ng-container *ngIf="users$ | async as users; else loadingTpl">
      <ng-container *ngIf="users.length; else emptyTpl">
        <table mat-table [dataSource]="users" class="users-table">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let row">{{ fullName(row) }}</td>
          </ng-container>

          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef>Email</th>
            <td mat-cell *matCellDef="let row">{{ row.email }}</td>
          </ng-container>

          <ng-container matColumnDef="userType">
            <th mat-header-cell *matHeaderCellDef>Type</th>
            <td mat-cell *matCellDef="let row">{{ row.userType || '-' }}</td>
          </ng-container>

          <ng-container matColumnDef="isAdmin">
            <th mat-header-cell *matHeaderCellDef>Admin</th>
            <td mat-cell *matCellDef="let row">{{ row.isAdmin ? 'Yes' : 'No' }}</td>
          </ng-container>

          <ng-container matColumnDef="companyName">
            <th mat-header-cell *matHeaderCellDef>Company</th>
            <td mat-cell *matCellDef="let row">{{ row.companyName || '-' }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let row">
              <button mat-icon-button (click)="view(row); $event.stopPropagation()">
                <mat-icon>open_in_new</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="view(row)"></tr>
        </table>
      </ng-container>
    </ng-container>

    <ng-template #loadingTpl>
      <div class="loading">
        <mat-progress-spinner diameter="32" mode="indeterminate"></mat-progress-spinner>
        <span>Loading users...</span>
      </div>
    </ng-template>

    <ng-template #emptyTpl>
      <p>No users found.</p>
    </ng-template>
  </mat-card>
</div>
