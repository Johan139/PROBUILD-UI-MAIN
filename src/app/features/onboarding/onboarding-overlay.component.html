@if (onboardingService.isActive()) {
  <div class="onboarding-overlay-container">
    <!-- Backdrop with cutout using box-shadow trick -->
    <!-- The highlight-box sits exactly on the element, and has a huge shadow to dim the rest -->
    <div class="highlight-box" [ngStyle]="spotlightStyle()"></div>
    <!-- Tooltip -->
    <div class="onboarding-tooltip" [ngStyle]="tooltipStyle()">
      <div class="tooltip-header">
        <h4>{{ onboardingService.getCurrentStep().title }}</h4>
        <span class="step-count">
          {{ onboardingService.currentStepIndex() + 1 }} / {{ onboardingService.currentTour().length }}
        </span>
      </div>
      <div class="tooltip-content">
        <p>{{ onboardingService.getCurrentStep().content }}</p>
      </div>
      <div class="tooltip-actions">
        <button mat-button class="btn btn-ghost" type="button" (click)="onboardingService.stopTour()">Skip</button>
        <div class="nav-buttons">
          <button mat-button class="btn btn-secondary" type="button"
            [disabled]="onboardingService.currentStepIndex() === 0"
            (click)="onboardingService.prevStep()">
            Prev
          </button>
          <button mat-button class="btn btn-primary" type="button"
            (click)="onboardingService.nextStep()">
            {{ onboardingService.currentStepIndex() === onboardingService.currentTour().length - 1 ? 'Finish' : 'Next' }}
          </button>
        </div>
      </div>
    </div>
  </div>
}
