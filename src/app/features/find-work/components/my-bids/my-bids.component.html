<div class="tab-pane">
    <div class="filter-buttons">
        <button class="filter-pill" [class.active]="quoteStatusFilter === 'All'" (click)="setFilter('All')">All</button>
        <button class="filter-pill" [class.active]="quoteStatusFilter === 'Draft'" (click)="setFilter('Draft')">Draft</button>
        <button class="filter-pill" [class.active]="quoteStatusFilter === 'Submitted'" (click)="setFilter('Submitted')">Submitted</button>
        <button class="filter-pill" [class.active]="quoteStatusFilter === 'Rejected'" (click)="setFilter('Rejected')">Rejected</button>
    </div>

    <div *ngIf="loading" class="loading">Loading your bids...</div>
    <div *ngIf="!loading && dataSource.data.length === 0" class="no-jobs">
        You haven't placed any bids matching this filter.
    </div>

    <ul class="job-list" *ngIf="!loading && dataSource.data.length > 0">
        <li *ngFor="let bid of dataSource.connect() | async; trackBy: trackByBidId" class="job-item card-style">
             <app-job-card
                *ngIf="bid.job"
                [job]="bid.job"
                [quote]="getQuoteForBid(bid)"
                (viewQuote)="onViewQuote(getQuoteForBid(bid))"
                (withdrawBid)="onWithdrawBid(bid)"
                (editBid)="onEditBid(bid)"
                (viewMoreInfo)="viewMoreInfo.emit(bid.job)"
                [userTrade]="userTrade"
                [showBidButton]="false"
            >
            </app-job-card>
        </li>
    </ul>
    <mat-paginator [length]="dataSource.data.length" [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
</div>
