<div class="map-section">
  <div class="map-header">
    <div class="location-label">
      <mat-icon>place</mat-icon>
      <span>Job Locations</span>
    </div>
    <div class="legend">
      <span class="legend-item"><span class="dot green"></span> Open Jobs</span>
      <span class="legend-item"><span class="dot yellow"></span> Your Postings</span>
      <span class="legend-item"><span class="dot blue"></span> Your Bids</span>
      <span class="legend-item"><span class="dot purple"></span> Saved</span>
    </div>
  </div>

  <div class="map-container">
    <!-- Loading state -->
    @if (isMapLoading && !mapLoadError) {
      <div class="map-loading">
        <div class="loading-spinner"></div>
        <p>Loading map...</p>
      </div>
    }

    <!-- Error state -->
    @if (mapLoadError) {
      <div class="map-error">
        <p>Failed to load Google Maps. Please check your API key and internet connection.</p>
        <button (click)="retryMapLoad()" class="retry-btn">Retry</button>
      </div>
    }

    <!-- Map component -->
    @if ((isApiLoaded$ | async) && !isMapLoading && !mapLoadError) {
      <google-map
        height="100%"
        width="100%"
        [center]="center"
        [zoom]="zoom"
        [options]="mapOptions"
        (mapInitialized)="onMapInitialized($event)"
        >
      </google-map>
    }
  </div>
</div>
