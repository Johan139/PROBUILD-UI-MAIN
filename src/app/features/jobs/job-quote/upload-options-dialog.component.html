<h2 mat-dialog-title>Upload Options</h2>
<mat-dialog-content>
  <p>You can upload individual files or a whole folder:</p>
</mat-dialog-content>
<mat-dialog-actions align="end" class="dialog-actions">
  <div class="button-row">
    <button mat-button class="btn btn-primary" [mat-dialog-close]="'files'">Upload Files</button>
    <button mat-button class="btn btn-secondary" [mat-dialog-close]="'folder'">Upload Folder</button>
  </div>
  <button mat-button class="btn btn-ghost" (click)="onNoClick()">Cancel</button>
</mat-dialog-actions>
