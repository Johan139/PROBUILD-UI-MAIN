<div class="stepper-container">
  <div class="stepper-header">

    <div class="progress-track-container">
      <!-- Background Line -->
      <div class="progress-track-bg"></div>

      <!-- Active Progress Line -->
      <div class="progress-track-fill" [style.width]="progressWidth"></div>

      <!-- Steps -->
      <div class="steps-container">
        @for (step of lifecycleSteps; track step; let i = $index) {
          <div
            class="step-item"
            >
            <!-- Step Circle -->
            <div
              class="step-circle"
              [class.completed]="isStepCompleted(step.id)"
              [class.current]="isStepCurrent(step.id)"
              [class.pending]="isStepPending(step.id)"
              >
              @if (isStepCompleted(step.id)) {
                <lucide-angular
                  [img]="CheckCircle2"
                  class="step-icon"
                  >
                </lucide-angular>
              }
              @if (!isStepCompleted(step.id)) {
                <lucide-angular
                  [img]="step.icon"
                  class="step-icon"
                  >
                </lucide-angular>
              }
            </div>
            <!-- Step Label -->
            <p
              class="step-label"
              [class.current-text]="isStepCurrent(step.id)"
              [class.completed-text]="isStepCompleted(step.id)"
              [class.pending-text]="isStepPending(step.id)"
              >
              {{ step.shortLabel }}
            </p>
          </div>
        }
      </div>
    </div>
  </div>
</div>
