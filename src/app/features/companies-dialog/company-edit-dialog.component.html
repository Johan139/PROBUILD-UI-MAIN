<h2 mat-dialog-title>Edit Company Details</h2>

<form [formGroup]="form" mat-dialog-content>
  <mat-form-field appearance="outline">
    <mat-label>Company Name</mat-label>
    <input matInput formControlName="name" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Email</mat-label>
    <input matInput formControlName="email" />
  </mat-form-field>

  <!-- PREFIX - Remove the wrapper div -->
  <mat-form-field appearance="outline" class="country-code-field">
    <mat-label>Prefix</mat-label>
    <mat-select
      [(value)]="selectedCompanyCountryCode"
      (selectionChange)="onCompanyCountryChanged()"
    >
      <mat-option>
        <input
          matInput
          placeholder="Search..."
          [formControl]="countryFilterCtrl"
          (keydown)="$event.stopPropagation()"
        />
      </mat-option>

      <mat-option *ngFor="let c of filteredCountryCodes | async" [value]="c">
        {{ c.countryCode }} ({{ c.countryPhoneNumberCode }})
      </mat-option>
    </mat-select>
  </mat-form-field>

  <!-- PHONE -->
  <mat-form-field appearance="outline" class="mobile-number-field">
    <mat-label>Phone</mat-label>
    <input
      matInput
      type="tel"
      formControlName="phoneNumber"
      (focus)="onPhoneFocus($event)"
      (keydown)="onPhoneKeyDown($event)"
      (paste)="onPhonePaste($event)"
    />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>VAT Number</mat-label>
    <input matInput formControlName="vatNo" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Company Address</mat-label>
    <input
      matInput
      formControlName="addressInput"
      placeholder="Search address..."
      [matAutocomplete]="companyAuto"
    />

    <mat-autocomplete
      #companyAuto="matAutocomplete"
      (optionSelected)="onCompanyAddressSelected($event)"
    >
      <mat-option
        *ngFor="let option of companyAddressOptions"
        [value]="option.description"
      >
        {{ option.description }}
      </mat-option>
    </mat-autocomplete>
  </mat-form-field>
</form>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
