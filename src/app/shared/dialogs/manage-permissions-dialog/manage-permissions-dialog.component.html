<h2 mat-dialog-title>Manage Permissions for {{ teamMemberName }}</h2>
<mat-dialog-content [formGroup]="permissionsForm">
  <div class="select-all-container">
    <mat-checkbox (change)="selectAll($event.checked)">Select All</mat-checkbox>
  </div>
  @for (group of groupedPermissions; track group) {
    <div class="permission-group">
      <h3>{{ group.group }}</h3>
      @for (permission of group.permissions; track permission) {
        <mat-checkbox [formControlName]="permission.key">
          {{ permission.name }}
        </mat-checkbox>
      }
    </div>
  }
</mat-dialog-content>
<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button class="btn btn-secondary" (click)="close()">Cancel</button>
  <button mat-button class="btn btn-primary" (click)="save()" [disabled]="permissionsForm.pristine || !permissionsForm.valid">Save</button>
</mat-dialog-actions>
