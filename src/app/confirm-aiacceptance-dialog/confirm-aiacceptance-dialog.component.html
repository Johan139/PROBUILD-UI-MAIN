<h1 mat-dialog-title>Confirm Job Details</h1>
<div mat-dialog-content>
  <p>
    Please confirm that you have reviewed the AI-generated output and
    subtasks, and that you accept them as correct.
  </p>
  <p
    *ngIf="warningMessage && warningMessage.length > 0"
    class="warning-message"
  >
    ⚠ {{ warningMessage }}
  </p>
</div>
<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button class="btn btn-secondary" (click)="onCancel()">Cancel</button>
  <button mat-button class="btn btn-primary" [disabled]="disableConfirm" (click)="onConfirm()">Confirm</button>
</mat-dialog-actions>
