<h1 mat-dialog-title>Confirm Job Details</h1>
<div mat-dialog-content>
  <p>
    Please confirm that you have reviewed the AI-generated output and
    subtasks, and that you accept them as correct.
  </p>
  <p
    *ngIf="warningMessage && warningMessage.length > 0"
    class="warning-message"
  >
    ⚠ {{ warningMessage }}
  </p>
</div>
<mat-dialog-actions align="end">
  <button mat-button class="dialog-btn return-btn" (click)="onCancel()">
    Cancel
  </button>
  <button
    mat-button
    class="dialog-btn confirm-btn"
    [disabled]="disableConfirm"
    (click)="onConfirm()"
  >
    Confirm
  </button>
</mat-dialog-actions>
